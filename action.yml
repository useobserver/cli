# Observer config-as-code — GitHub composite action.
#
# On pull_request: `dry-run` (posts the plan, fails the check on invalid config).
# On push to main: `apply`.
#
# Runs the CLI with the Node already present on GitHub-hosted runners — no
# binary download needed inside CI.
#
# Usage:
#   - uses: useobserver/cli@v1
#     with:
#       file: observer.yaml
#       mode: ${{ github.event_name == 'pull_request' && 'dry-run' || 'apply' }}
#     env:
#       OBSERVER_API_URL: ${{ vars.OBSERVER_API_URL }}
#       OBSERVER_API_KEY: ${{ secrets.OBSERVER_API_KEY }}
name: "Observer config apply"
description: "Apply (or dry-run) an Observer config-as-code document via the public API"
branding:
  icon: "check-circle"
  color: "blue"
inputs:
  file:
    description: "Path to the Observer config YAML"
    required: true
    default: "observer.yaml"
  mode:
    description: "apply | dry-run"
    required: false
    default: "dry-run"
  prune:
    description: "Delete config-managed objects not present in the document"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Apply Observer config
      shell: bash
      run: |
        flags=""
        [ "${{ inputs.mode }}" = "dry-run" ] && flags="$flags --dry-run"
        [ "${{ inputs.prune }}" = "true" ] && flags="$flags --prune"
        node "${{ github.action_path }}/bin.mjs" apply -f "${{ inputs.file }}" $flags
