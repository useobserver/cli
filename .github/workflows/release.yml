name: Build CLI binaries + GitHub release

# Public mirror binary build. Source comes from the monorepo's
# tools/mirror-cli/mirror.sh — never edit this file in the public repo directly.
# Update tools/mirror-cli/templates/release.yml in the monorepo and copy by hand.
# SSH deploy keys cannot push workflow files, so this file lives in the public
# repo as a one-time manual install.
#
# Runs in the PUBLIC repo (useobserver/cli) on cli-v* tags forwarded by
# mirror.sh. Produces five Bun-compiled binaries + checksums and attaches them
# to a public GitHub Release.
#
# Runs on macos-latest (Apple Silicon). Bun cross-compiles every target from
# macOS, AND the two darwin binaries are ad-hoc code-signed here with the real
# `codesign`. This is deliberate: Bun's cross-compiled darwin binaries carry a
# "linker-signed" ad-hoc signature that the macOS kernel rejects as invalid
# ("code or signature have been modified"), so a binary built on Linux is killed
# with SIGKILL on every Mac. Signing on a real macOS host produces a valid
# ad-hoc signature; the smoke test then RUNS the host-arch darwin binary so a
# bad signature fails the job before publish.
#
# Local build (private monorepo):  bun run --cwd apps/cli build:binaries
# Local build (public mirror):     bun run build:binaries

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to build from"
        required: false
        default: "main"

permissions:
  contents: write # required to create a Release + upload assets

jobs:
  release:
    name: Build CLI binaries
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Unit tests (Node source)
        run: node --test

      - name: Resolve version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/cli-v* ]]; then
            TAG_VERSION=${GITHUB_REF#refs/tags/cli-v}
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "::warning::Tag cli-v$TAG_VERSION does not match package.json version $VERSION"
            fi
          fi

      - name: Build all targets
        run: bun run build:binaries

      - name: Ad-hoc code-sign the macOS binaries
        # Bun's cross-compiled darwin binaries ship an invalid "linker-signed"
        # ad-hoc signature; re-sign with the real codesign so the macOS kernel
        # accepts them. Must run BEFORE checksums (signing changes the bytes).
        run: |
          for bin in dist/observer-darwin-arm64 dist/observer-darwin-x64; do
            codesign --force --sign - --timestamp=none "$bin"
            codesign --verify --verbose=2 "$bin"
          done

      - name: Smoke-test the compiled binary
        # The release ships Bun-compiled executables, NOT the Node source the
        # unit tests run under. Run the freshly built host-arch (darwin-arm64)
        # binary so a Bun/compile/bundle regression OR an invalid code signature
        # fails the job before publish. (A bad signature SIGKILLs this step.)
        run: |
          chmod +x dist/observer-darwin-arm64
          ./dist/observer-darwin-arm64 --version

      - name: Generate checksums
        working-directory: dist
        run: |
          shasum -a 256 observer-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts (workflow_dispatch retention)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: observer-cli-binaries-${{ steps.version.outputs.version }}
          path: dist/*
          retention-days: 30

      - name: Create GitHub Release
        # softprops/action-gh-release updates an existing release for the tag if
        # one already exists, so re-running the workflow for a tag is idempotent.
        if: startsWith(github.ref, 'refs/tags/cli-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Observer CLI ${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/observer-linux-x64
            dist/observer-linux-arm64
            dist/observer-darwin-x64
            dist/observer-darwin-arm64
            dist/observer-windows-x64.exe
            dist/SHA256SUMS.txt
          body: |
            Standalone Bun-compiled `observer` CLI binaries. No runtime install
            required on the target host — each binary embeds the Bun runtime.

            ## Install

            ```sh
            curl -fsSL https://raw.githubusercontent.com/useobserver/cli/main/install.sh | sh
            ```

            ## Download

            | Platform    | File                          |
            |-------------|-------------------------------|
            | Linux x64   | `observer-linux-x64`          |
            | Linux arm64 | `observer-linux-arm64`        |
            | macOS x64   | `observer-darwin-x64`         |
            | macOS arm64 | `observer-darwin-arm64`       |
            | Windows x64 | `observer-windows-x64.exe`    |

            Verify with `sha256sum -c SHA256SUMS.txt`.
